<!--增加宽屏下的显示内容-->
<style>
  .container {
    min-width: 66.6%;
    min-height: 100vh;
  }
  @media only print {
    .container {
      min-width: 100%;
    }
  }
</style>
<!--网站背景图片，分竖屏、宽屏；改链接即可，不想用可以把这一项全删掉；要换壁纸图片的话可把url内的部分换成你自己的，比如你放在 /assets/image/background.jpg，那就改成 url(/assets/image/background.jpg)-->
<style>
  .warp {
    background-image: url({{ page.settings.body.background-img }});
  }
  @media (min-aspect-ratio: 2400/1850) {
    .wrap {
      background-image: url({{ page.settings.body.background-img }});
    }
  }
</style>

<!--多主题正文配色：通过 CSS 变量定义每个主题的正文区颜色-->
<style>
  body.theme-base-07 { --bg:#ffffff; --text:#303030; --link:#268bd2; --code-bg:#f4f4f4; --code-text:#d63384; --border:#e1e4e8; --quote:#6a737d; }
  body.theme-base-08 { --bg:#fefcfc; --text:#2d1e1e; --link:#cc342d; --code-bg:#fef0f0; --code-text:#cc342d; --border:#f0d0d0; --quote:#8b5555; }
  body.theme-base-09 { --bg:#fefaf6; --text:#2d241e; --link:#d28400; --code-bg:#fef6e8; --code-text:#b8700a; --border:#f0d8b0; --quote:#8b6d44; }
  body.theme-base-0a { --bg:#fdfcf6; --text:#2d2b1e; --link:#8b8b00; --code-bg:#fefde8; --code-text:#6b6b00; --border:#e0dda0; --quote:#7a7844; }
  body.theme-base-0b { --bg:#f6fdf7; --text:#1e2d20; --link:#28a745; --code-bg:#eaf7ec; --code-text:#1a7a2e; --border:#b8dfc0; --quote:#4b7a55; }
  body.theme-base-0c { --bg:#f6fdfd; --text:#1e2a2d; --link:#17a2b8; --code-bg:#e8f7f9; --code-text:#0f7a8a; --border:#b0dde4; --quote:#4b7a80; }
  body.theme-base-0d { --bg:#1e1e2e; --text:#cdd6f4; --link:#89b4fa; --code-bg:#313244; --code-text:#f2cdcd; --border:#45475a; --quote:#a6adc8; }
  body.theme-base-0e { --bg:#faf6fd; --text:#241e2d; --link:#6f42c1; --code-bg:#f4eafa; --code-text:#5a2ea6; --border:#d0bdf0; --quote:#6b4b8b; }
  body.theme-base-0f { --bg:#fdf6fa; --text:#2d1e26; --link:#d63384; --code-bg:#fde8f2; --code-text:#b82a6e; --border:#f0b8d4; --quote:#8b4b6e; }
</style>

<!--应用主题变量到正文区域-->
<style>
  .wrap {
    background-color: var(--bg);
  }
  .container.content {
    padding: 2rem;
    box-shadow: 0 0 2rem rgba(255,255,255,0.9);
    background: var(--bg);
    color: var(--text);
    animation-duration: 2s;
    animation-name: fadeIn;
  }
  a { color: var(--link); }
  a:hover { color: var(--link); opacity: 0.8; }
  code { background: var(--code-bg); color: var(--code-text); }
  pre { background: var(--code-bg); }
  table, th, td { border-color: var(--border); }
  hr { border-color: var(--border); }
  blockquote { border-left-color: var(--link); color: var(--quote); }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
</style>
