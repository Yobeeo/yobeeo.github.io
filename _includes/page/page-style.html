<!--增加宽屏下的显示内容-->
<style>
  .container {
    min-width: 66.6%;
    min-height: 100vh;
  }
  @media only print {
    .container {
      min-width: 100%;
    }
  }
</style>
<!--网站背景图片，固定在背后不随内容滚动-->
<style>
  .site-bg {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-image: url({{ page.settings.body.background-img }});
    background-size: contain;
    background-position: center;
    background-repeat: no-repeat;
    z-index: -1;
  }
</style>

<!--多主题正文配色：通过 CSS 变量定义每个主题的正文区颜色-->
<style>
  body {
    --bg:#ffffff; --text:#303030; --link:#268bd2;
    --code-bg:#f4f4f4; --code-text:#d63384;
    --border:#e1e4e8; --quote:#6a737d;
  }
  body.theme-base-07 { --bg:#1e2233; --text:#e8e8f0; --link:#88ccff; --code-bg:#2d3148; --code-text:#ffcc88; --border:#3a3f55; --quote:#aabbcc; }
  body.theme-base-07 .container.content { background: rgba(30,34,51,0.8); box-shadow: 0 0 2rem rgba(0,0,0,0.6); }
  body.theme-base-07 .sidebar-toggle { color: #e8e8f0; background-color: #2d3148; }
  body.theme-base-07 #sidebar-checkbox:checked ~ .sidebar-toggle,
  body.theme-base-07 .sidebar-toggle:active { color: #e8e8f0; background-color: #3a3f55; }
  body.theme-base-08 { --bg:#fefcfc; --text:#2d1e1e; --link:#cc342d; --code-bg:#fef0f0; --code-text:#cc342d; --border:#f0d0d0; --quote:#8b5555; }
  body.theme-base-09 { --bg:#fefaf6; --text:#2d241e; --link:#d28400; --code-bg:#fef6e8; --code-text:#b8700a; --border:#f0d8b0; --quote:#8b6d44; }
  body.theme-base-0a { --bg:#fdfcf6; --text:#2d2b1e; --link:#8b8b00; --code-bg:#fefde8; --code-text:#6b6b00; --border:#e0dda0; --quote:#7a7844; }
  body.theme-base-0b { --bg:#f6fdf7; --text:#1e2d20; --link:#28a745; --code-bg:#eaf7ec; --code-text:#1a7a2e; --border:#b8dfc0; --quote:#4b7a55; }
  body.theme-base-0c { --bg:#f6fdfd; --text:#1e2a2d; --link:#17a2b8; --code-bg:#e8f7f9; --code-text:#0f7a8a; --border:#b0dde4; --quote:#4b7a80; }
  body.theme-base-0d { --bg:#f2f6fb; --text:#1a2533; --link:#2266cc; --code-bg:#e8eff7; --code-text:#1a4a8a; --border:#c8d6e8; --quote:#4a6a8a; }
  body.theme-base-0e { --bg:#faf6fd; --text:#241e2d; --link:#6f42c1; --code-bg:#f4eafa; --code-text:#5a2ea6; --border:#d0bdf0; --quote:#6b4b8b; }
  body.theme-base-0f { --bg:#fdf6fa; --text:#2d1e26; --link:#d63384; --code-bg:#fde8f2; --code-text:#b82a6e; --border:#f0b8d4; --quote:#8b4b6e; }
</style>

<!--应用主题变量到正文区域-->
<style>
  .site-bg {
    background-color: var(--bg, #ffffff);
  }
  .wrap {
    /* wrap 不设背景，由 site-bg 层负责 */
  }
  .container.content {
    padding: 2rem;
    box-shadow: 0 0 2rem rgba(0,0,0,0.5);
    color: var(--text, #303030);
    animation-duration: 2s;
    animation-name: fadeIn;
  }
  /* 每个主题的正文背景 — 主题色 tint 半透明层，兼顾可读性与主题氛围 */
  body.theme-base-07 .container.content { background: rgba(30,34,51,0.88); box-shadow: 0 0 2rem rgba(0,0,0,0.6); }
  body.theme-base-08 .container.content { background: linear-gradient(135deg, rgba(204,52,45,0.15), rgba(254,252,252,0.85)); box-shadow: 0 0 2rem rgba(204,52,45,0.15); }
  body.theme-base-09 .container.content { background: linear-gradient(135deg, rgba(210,132,0,0.12), rgba(253,250,246,0.88)); box-shadow: 0 0 2rem rgba(210,132,0,0.12); }
  body.theme-base-0a .container.content { background: linear-gradient(135deg, rgba(139,139,0,0.10), rgba(253,252,246,0.88)); box-shadow: 0 0 2rem rgba(139,139,0,0.10); }
  body.theme-base-0b .container.content { background: linear-gradient(135deg, rgba(40,167,69,0.12), rgba(246,253,247,0.88)); box-shadow: 0 0 2rem rgba(40,167,69,0.12); }
  body.theme-base-0c .container.content { background: linear-gradient(135deg, rgba(23,162,184,0.12), rgba(246,253,253,0.88)); box-shadow: 0 0 2rem rgba(23,162,184,0.12); }
  body.theme-base-0d .container.content { background: linear-gradient(135deg, rgba(34,102,204,0.12), rgba(242,246,251,0.88)); box-shadow: 0 0 2rem rgba(34,102,204,0.12); }
  body.theme-base-0e .container.content { background: linear-gradient(135deg, rgba(111,66,193,0.12), rgba(250,246,253,0.88)); box-shadow: 0 0 2rem rgba(111,66,193,0.12); }
  body.theme-base-0f .container.content { background: linear-gradient(135deg, rgba(214,51,132,0.12), rgba(253,246,250,0.88)); box-shadow: 0 0 2rem rgba(214,51,132,0.12); }
  a { color: var(--link, #268bd2); }
  a:hover { color: var(--link, #268bd2); opacity: 0.8; }
  code { background: var(--code-bg, #f4f4f4); color: var(--code-text, #d63384); }
  pre { background: var(--code-bg, #f4f4f4); color: var(--text, #303030); }
  pre code { color: var(--text, #303030); }

  /* 标题 */
  h1, h2, h3, h4, h5, h6 { color: var(--text, #313131); }
  .page-title, .post-title, .post-title a { color: var(--text, #303030); }
  .post-date { color: var(--quote, #9a9a9a); }
  strong { color: var(--text, #303030); }

  /* 引用和辅助文本 */
  blockquote { border-left-color: var(--link, #268bd2); color: var(--quote, #6a737d); }
  .lead { color: var(--text, #303030); }
  .message { color: var(--text, #303030); background-color: var(--code-bg, #f9f9f9); }

  /* 表格 */
  table { border-color: var(--border, #e1e4e8); }
  td, th { border-color: var(--border, #e1e4e8); }
  tbody tr:nth-child(odd) td, tbody tr:nth-child(odd) th { background-color: var(--code-bg, #f9f9f9); }

  /* 分页 */
  .pagination { color: var(--quote, #ccc); }
  .pagination-item { border-color: var(--border, #eee); }
  a.pagination-item:hover { background-color: var(--code-bg, #f5f5f5); }

  /* 相关博文 */
  .related { border-top-color: var(--border, #eee); }
  .related-posts li small { color: var(--quote, #999); }

  /* 分割线 */
  hr { border-color: var(--border, #e1e4e8); }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
</style>
