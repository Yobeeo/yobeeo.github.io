<!-- Live2D 看板娘 - oh-my-live2d (支持 Cubism 2/3/4) -->
<!-- 预加载 Cubism Core SDK，oh-my-live2d 缺少这个 WASM -->
<script src="https://cdn.jsdelivr.net/npm/live2dcubismcore@1.0.2/live2dcubismcore.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/oh-my-live2d/dist/index.min.js"></script>
<script>
  (function() {
    var themes = [
      'theme-base-07','theme-base-08','theme-base-09',
      'theme-base-0a','theme-base-0b','theme-base-0c',
      'theme-base-0d','theme-base-0e','theme-base-0f'
    ];
    var sidebarColors = [
      '#202020','#ac4142','#d28445',
      '#f4bf75','#90a959','#75b5aa',
      '#6a9fb5','#aa759f','#fda7b8'
    ];
    var modelBgs = [
      '/assets/imgs/bg_grizzly.jpg','/assets/imgs/bg_lafei.jpg','/assets/imgs/bg_grizzly.jpg',
      '/assets/imgs/bg_shield.jpg','/assets/imgs/bg_grizzly.jpg','/assets/imgs/bg_grizzly.jpg',
      '/assets/imgs/bg_chuixue.jpg','/assets/imgs/bg_grizzly.jpg','/assets/imgs/bg_sagiri.jpg',
    ];

    function switchTheme(oml2d) {
      var body = document.body;
      for (var i = 0; i < themes.length; i++) {
        if (body.classList.contains(themes[i])) {
          var next = (i + 1) % themes.length;
          body.classList.remove(themes[i]);
          body.classList.add(themes[next]);
          oml2d.loadModelByIndex(next % oml2d.options.models.length);
          var siteBg = document.querySelector('.site-bg');
          if (siteBg) siteBg.style.backgroundImage = 'url(' + modelBgs[next % modelBgs.length] + ')';
          // 按钮 / 弹框 / 状态栏的颜色跟着主题，而不是模型
          var c = sidebarColors[next];
          var btn = document.getElementById('switch-theme');
          if (btn) btn.style.cssText = 'background:' + c + '!important;border-color:' + c + '!important;color:#fff!important';
          var tip = document.querySelector('.oml2d-tips');
          if (tip) tip.style.cssText = 'background:' + c + '!important;color:#fff!important';
          var bar = document.getElementById('oml2d-statusBar');
          if (bar) bar.style.cssText = 'background:' + c + '!important;color:#fff!important';
          break;
        }
      }
    }

    window.OML2D.loadOml2d({
      dockedPosition: '{{ page.settings.live2d.position }}',
      models: [
        { name: 'grizzly',    path: "{{ '/assets/res/live2d/grizzly_2102/model.json' | relative_url }}", scale: 0.12, position: [0, 50] },
        { name: 'lafei',      path: "{{ '/assets/res/live2d/lafei_4/lafei_4.model3.json' | relative_url }}", scale: 0.09, position: [0, 50] },
        { name: 'biaoqiang',  path: "{{ '/assets/res/live2d/biaoqiang_3/biaoqiang_3.model3.json' | relative_url }}", scale: 0.1, position: [0, 50] },
        { name: 'shield',     path: "{{ '/assets/res/live2d/shield/model1.json' | relative_url }}", scale: 0.16, position: [0, 50] },
        { name: 'grizzly',    path: "{{ '/assets/res/live2d/grizzly_2102/model.json' | relative_url }}", scale: 0.12, position: [0, 50] },
        { name: 'grizzly',    path: "{{ '/assets/res/live2d/grizzly_2102/model.json' | relative_url }}", scale: 0.12, position: [0, 50] },
        { name: 'chuixue',    path: "{{ '/assets/res/live2d/chuixue_3/chuixue_3.model3.json' | relative_url }}", scale: 0.12, position: [0, 50] },
        { name: 'dujiaoshou', path: "{{ '/assets/res/live2d/dujiaoshou_4/dujiaoshou_4.model3.json' | relative_url }}", scale: 0.12, position: [0, 50] },
        { name: 'sagiri',     path: "{{ '/assets/res/live2d/sagiri/model.json' | relative_url }}", scale: 0.28, position: [0, 50] },
      ],
      menus: function(currentModel, modelIndex) {
        return {
          itemStyle: {
            backgroundColor: sidebarColors[modelIndex % sidebarColors.length],
            borderColor: sidebarColors[modelIndex % sidebarColors.length],
            color: '#fff'
          },
          items: [{
            id: 'switch-theme',
            title: 'キミのためなら、何度でも変わるよ~',
            onClick: switchTheme
          }]
        };
      },
      tips: function(currentModel, modelIndex) {
        return {
          style: {
            backgroundColor: sidebarColors[modelIndex],
            color: '#fff'
          },
          welcomeTips: {
            message: {
              daybreak: '早上好！一日之计在于晨~',
              morning: '上午好！工作顺利嘛，不要久坐哦~',
              noon: '中午了，现在是午餐时间！',
              afternoon: '午后容易犯困呢，来杯咖啡吧~',
              dusk: '傍晚了！今天过得怎么样？',
              night: '晚上好呀~',
              lateNight: '很晚了呢，早点休息吧~',
              weeHours: '这么晚还不睡？当心熬夜秃头哦！'
            }
          },
          idleTips: {
            interval: 15000,
            message: [
              'キミのためなら、何度でも変わるよ~',
              '有什么想对我说的吗？',
              '今天写了几行代码呀？',
              '要不要换一个主题试试看？',
              '记得 star 我的 GitHub 哦~'
            ]
          }
        };
      },
      sayHello: false
    }).then(function(oml2d) {
      var body = document.body;
      for (var i = 0; i < themes.length; i++) {
        if (body.classList.contains(themes[i])) {
          if (i !== 0) oml2d.loadModelByIndex(i % oml2d.options.models.length);
          break;
        }
      }
      // 每次模型加载成功后更新按钮和弹框颜色
      oml2d.onLoad(function(status) {
        if (status === 'success') {
          // 颜色跟着当前主题，而不是模型 mod
          var body = document.body;
          var idx = 0;
          for (var i = 0; i < themes.length; i++) {
            if (body.classList.contains(themes[i])) { idx = i; break; }
          }
          var c = sidebarColors[idx];
          setTimeout(function() {
            var btn = document.getElementById('switch-theme');
            if (btn) btn.style.cssText = 'background:' + c + '!important;border-color:' + c + '!important;color:#fff!important';
            var tip = document.querySelector('.oml2d-tips');
            if (tip) tip.style.cssText = 'background:' + c + '!important;color:#fff!important';
            var bar = document.getElementById('oml2d-statusBar');
            if (bar) bar.style.cssText = 'background:' + c + '!important;color:#fff!important';
          }, 100);
        }
      });
    });
  })();
</script>
