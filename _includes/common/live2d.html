<!--引入live2d看板娘！-->
<link
  rel="stylesheet"
  href="https://cdn.jsdelivr.net/gh/Dreamer-Paul/Pio@2.4/static/pio.min.css"
/>
<style>
  .pio-home,
  .pio-skin,
  .pio-info,
  .pio-close { display: none !important; }
  .pio-dialog { display: none !important; }
  .pio-night {
    position: relative;
  }
  .pio-night:hover::after {
    content: "キミのためなら、何度でも変わるよ~";
    position: absolute;
    right: 3rem;
    top: 50%;
    transform: translateY(-50%);
    white-space: nowrap;
    background: rgba(0,0,0,0.75);
    color: #fff;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 0.8rem;
    z-index: 99;
  }
</style>

<script
  async="async"
  src="https://cdn.jsdelivr.net/combine/gh/Dreamer-Paul/Pio@2.4/static/l2d.min.js,gh/Dreamer-Paul/Pio@2.4/static/pio.min.js"
  onload='
    let pio_container = document.createElement("div");
    pio_container.classList.add("pio-container");
    pio_container.classList.add("{{ page.settings.live2d.position }}");
    pio_container.style.bottom = "-2rem";
    pio_container.style.zIndex = "1";
    document.body.insertAdjacentElement("beforeend", pio_container);
    let pio_action = document.createElement("div");
    pio_action.classList.add("pio-action");
    pio_container.insertAdjacentElement("beforeend", pio_action);
    let pio_canvas = document.createElement("canvas");
    pio_canvas.id = "pio";
    pio_canvas.style.width = "14rem";
    pio_canvas.width = "{{ page.settings.live2d.width }}";
    pio_canvas.height = "{{ page.settings.live2d.height }}";
    pio_container.insertAdjacentElement("beforeend", pio_canvas);
    let pio = new Paul_Pio({
      "mode": "{{ page.settings.live2d.mode }}",
      "hidden": {{ page.settings.live2d.hidden }},
      "night": "window.__nightCallback()",
      "content": {
        "link": ["https:\/\/jekyll-theme-WuK.wu-kan.cn"],
        "skin": ["换个老婆~"],
        "hidden": true,
        "custom": [{
          "selector": "a",
          "type": "link",
        }, {
          "selector": ".sidebar-toggle",
          "text": "打开侧边栏嘿嘿~"
        }, {
          "selector": ".effect-info",
          "text": "哇，你发现了什么！"
        }, {
          "selector": "#sidebar-search-input",
          "text": "搜索点什么呢？"
        }, {
          "selector": "#toc",
          "text": "这个是目录~"
        }, {
          "selector": ".page-title",
          "text": "这个是标题~"
        }]
      },
      "model": [
      "{{ "/assets/res/live2d/sagiri/model.json" | relative_url }}",
        "{{ "/assets/res/live2d/grizzly_2102/model.json" | relative_url }}",
        "{{ "/assets/res/live2d/shield/model1.json" | relative_url }}",
        "{{ "/assets/res/live2d/kobayaxi/Kobayaxi.model.json" | relative_url }}",
        "{{ "/assets/res/live2d/mashiro/seifuku.model.json" | relative_url }}",
        "{{ "/assets/res/live2d/rem/model.json" | relative_url }}"]
    });
    // 暴露实例 + 主题/模型/背景配套映射
    window.__pio = pio;
    window.__modelBgs = [
      `/assets/imgs/bg_sagiri.jpg`,
      `/assets/imgs/bg_grizzly.jpg`,
      `/assets/imgs/bg_shield.jpg`,
      `/assets/imgs/bg_kobayaxi.jpg`,
      `/assets/imgs/bg_mashiro.jpg`,
      `/assets/imgs/bg_rem.jpg`
    ];
    // 9 个主题分别配哪个模型（索引 0~5）
    window.__themeModelMap = [0, 1, 2, 3, 4, 5, 0, 1, 2];
    window.__modelPaths = [
      "{{ "/assets/res/live2d/sagiri/model.json" | relative_url }}",
      "{{ "/assets/res/live2d/grizzly_2102/model.json" | relative_url }}",
      "{{ "/assets/res/live2d/shield/model1.json" | relative_url }}",
      "{{ "/assets/res/live2d/kobayaxi/Kobayaxi.model.json" | relative_url }}",
      "{{ "/assets/res/live2d/mashiro/seifuku.model.json" | relative_url }}",
      "{{ "/assets/res/live2d/rem/model.json" | relative_url }}"
    ];
    window.__currentModel = 0;
    window.__switchModel = function(idx){
      if(typeof loadlive2d === `function`){
        loadlive2d(`pio`, window.__modelPaths[idx]);
        window.__currentModel = idx;
      }
    };
    window.__nightCallback = function(){
      var t = [`theme-base-07`,`theme-base-08`,`theme-base-09`,`theme-base-0a`,`theme-base-0b`,`theme-base-0c`,`theme-base-0d`,`theme-base-0e`,`theme-base-0f`];
      for(var i = 0; i < 9; i++){
        if(document.body.classList.contains(t[i])){
          var next = (i + 1) % 9;
          document.body.classList.remove(t[i]);
          document.body.classList.add(t[next]);
          // 同步切换模型
          var mIdx = window.__themeModelMap[next];
          window.__switchModel(mIdx);
          // 同步切换背景
          var siteBg = document.querySelector(`.site-bg`);
          if(siteBg) siteBg.style.backgroundImage = `url(${window.__modelBgs[mIdx]})`;
          break;
        }
      }
    };
    // 换 Live2D 角色(皮肤按钮)时同步切换背景
    setTimeout(function(){
      var bgIdx = 0;
      var check = setInterval(function(){
        var btn = document.querySelector(`.pio-skin`);
        if(btn && !btn.dataset.bgHooked){
          btn.dataset.bgHooked = `1`;
          btn.addEventListener(`click`, function(){
            bgIdx = (bgIdx + 1) % window.__modelBgs.length;
            var siteBg = document.querySelector(`.site-bg`);
            if(siteBg) siteBg.style.backgroundImage = `url(${window.__modelBgs[bgIdx]})`;
          });
          clearInterval(check);
        }
      }, 300);
    }, 800);
'
></script>
